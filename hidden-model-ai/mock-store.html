<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mock Fashion Store</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f3f4f6; padding: 40px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .product-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); text-align: center; }
        .product-image { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; margin-bottom: 16px; background: #e5e7eb; }
        .btn { display: inline-block; background: black; color: white; padding: 10px 20px; text-decoration: none; border-radius: 6px; font-size: 14px; margin-top: 10px; font-weight: 600; }
        .btn:hover { background: #333; }
        h2 { margin-bottom: 30px; }
    </style>
</head>
<body>
    <h2>Latest Collection</h2>
    <div class="grid">
        <!-- Product 1 -->
        <div class="product-card">
            <img src="https://placehold.co/400x500/png?text=Product+1" class="product-image" alt="Product 1">
            <h3>Urban Jacket</h3>
            <p>$120.00</p>
            <a href="http://localhost:3000/?product_image=https://placehold.co/400x500/png?text=Product+1" class="btn">Try with Hidden Model</a>
        </div>

        <!-- Product 2 -->
        <div class="product-card">
            <img src="https://placehold.co/400x500/png?text=Product+2" class="product-image" alt="Product 2">
            <h3>Summer Dress</h3>
            <p>$89.00</p>
            <a href="http://localhost:3000/?product_image=https://placehold.co/400x500/png?text=Product+2" class="btn">Try with Hidden Model</a>
        </div>

        <!-- Product 3 -->
        <div class="product-card">
            <img src="https://placehold.co/400x500/png?text=Product+3" class="product-image" alt="Product 3">
            <h3>Formal Shirt</h3>
            <p>$65.00</p>
            <a href="http://localhost:3000/?product_image=https://placehold.co/400x500/png?text=Product+3" class="btn">Try with Hidden Model</a>
        </div>

        <!-- Product 4 -->
        <div class="product-card">
            <img src="https://placehold.co/400x500/png?text=Product+4" class="product-image" alt="Product 4">
            <h3>Denim Jeans</h3>
            <p>$95.00</p>
            <a href="http://localhost:3000/?product_image=https://placehold.co/400x500/png?text=Product+4" class="btn">Try with Hidden Model</a>
        </div>
    </div>
</body>
</html>
